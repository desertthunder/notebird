{{define "layout-main"}}
<div class="app-shell">
	{{template "sidebar" .}}

	<main class="timeline" aria-label="Timeline">
		<header class="timeline__header">
			<h1>{{if .Filter.Query}}Search{{else if .Filter.Tag}}#{{.Filter.Tag}}{{else if eq .Filter.Mode "wanted"}}Wanted{{else}}Home{{end}}</h1>
			<span class="timeline__badge">local</span>
		</header>
		{{template "chirp-create" .}}
		{{template "chirp-list" .}}
	</main>

	{{template "chirp-detail" .}}
</div>
{{end}}
