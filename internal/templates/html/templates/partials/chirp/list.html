{{define "chirp-list"}}
<section id="feed" class="feed" aria-live="polite" hx-get="/chirps" hx-trigger="notebird:feed-refresh from:body" hx-swap="outerHTML">
	{{if .Chirps}} {{range .Chirps}}{{template "chirp-item" .}}{{end}} {{else}}
	<article class="empty-state">
		<h2>Your timeline is quiet.</h2>
		<p>Write the first Chirp. Use Markdown, add #tags, and link notes later with wiki links.</p>
	</article>
	{{end}}
</section>
{{end}}
