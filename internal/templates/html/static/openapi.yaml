openapi: 3.0.3
info:
  title: Notebird API
  version: 0.1.0
  description: Local HTTP API for Notebird, a personal wiki built from Chirps.
servers:
  - url: http://127.0.0.1:7331
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /:
    get:
      summary: Render the main Notebird UI
      responses:
        '200':
          description: HTML application shell
          content:
            text/html:
              schema:
                type: string
  /chirps:
    get:
      summary: Render feed fragment
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Full-text search query.
        - name: tag
          in: query
          schema:
            type: string
          description: Filter feed by tag.
        - name: mode
          in: query
          schema:
            type: string
            enum: [timeline, wanted]
          description: Feed mode.
      responses:
        '200':
          description: Feed HTML fragment
          content:
            text/html:
              schema:
                type: string
    post:
      summary: Create a Chirp
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [text]
              properties:
                title:
                  type: string
                  description: Optional title. Defaults to first line of text.
                text:
                  type: string
                  description: Markdown body.
      responses:
        '200':
          description: Feed HTML fragment
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid form data
  /chirps/{id}:
    get:
      summary: Render Chirp detail fragment
      parameters:
        - $ref: '#/components/parameters/ChirpID'
      responses:
        '200':
          description: Detail HTML fragment
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Chirp not found
    put:
      summary: Update a Chirp
      parameters:
        - $ref: '#/components/parameters/ChirpID'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [text]
              properties:
                title:
                  type: string
                text:
                  type: string
      responses:
        '200':
          description: Updated detail HTML fragment
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid form data
    delete:
      summary: Delete a Chirp
      parameters:
        - $ref: '#/components/parameters/ChirpID'
      responses:
        '200':
          description: Empty detail HTML fragment
          content:
            text/html:
              schema:
                type: string
  /chirps/{id}/edit:
    get:
      summary: Render Chirp edit form fragment
      parameters:
        - $ref: '#/components/parameters/ChirpID'
      responses:
        '200':
          description: Edit form HTML fragment
          content:
            text/html:
              schema:
                type: string
  /nav:
    get:
      summary: Render sidebar navigation fragment
      responses:
        '200':
          description: Sidebar HTML fragment with tags and wanted links
          content:
            text/html:
              schema:
                type: string
  /preview:
    post:
      summary: Render Markdown preview
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: Markdown body to preview.
      responses:
        '200':
          description: Rendered Markdown HTML fragment
          content:
            text/html:
              schema:
                type: string
  /suggest:
    get:
      summary: Suggest Chirp titles or tags for editor completion
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [chirp, tag]
            default: chirp
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Completion suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Suggestion'
  /debug/config:
    get:
      summary: Show runtime config
      responses:
        '200':
          description: Runtime config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
  /debug/vars:
    get:
      summary: expvar debug variables
      responses:
        '200':
          description: expvar JSON
          content:
            application/json:
              schema:
                type: object
  /docs:
    get:
      summary: Swagger UI API documentation
      responses:
        '200':
          description: API documentation page
          content:
            text/html:
              schema:
                type: string
  /openapi.yaml:
    get:
      summary: OpenAPI v3 specification
      responses:
        '200':
          description: OpenAPI document
          content:
            application/yaml:
              schema:
                type: string
components:
  parameters:
    ChirpID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Chirp ULID
  schemas:
    Suggestion:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        detail:
          type: string
    Config:
      type: object
      properties:
        data_dir:
          type: string
        host:
          type: string
        port:
          type: integer
    Chirp:
      type: object
      properties:
        id:
          type: string
          description: ULID canonical identity.
        title:
          type: string
        text:
          type: string
        type:
          type: string
          example: text/markdown
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
